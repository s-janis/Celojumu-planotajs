    <script>
        (function() {
            function mkIcon(sz) {
                var cv = document.createElement('canvas'),
                    ctx = cv.getContext('2d');
                cv.width = sz;
                cv.height = sz;
                var cx = sz / 2,
                    cy = sz / 2,
                    r = sz / 2 - 3;
                ctx.fillStyle = '#1A5F58';
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                var s = sz * 0.48;
                ctx.moveTo(cx + s * 0.58, cy);
                ctx.lineTo(cx - s * 0.12, cy - s * 0.30);
                ctx.lineTo(cx - s * 0.12, cy - s * 0.06);
                ctx.lineTo(cx - s * 0.46, cy + s * 0.10);
                ctx.lineTo(cx - s * 0.46, cy - s * 0.30);
                ctx.lineTo(cx - s * 0.58, cy);
                ctx.lineTo(cx - s * 0.46, cy + s * 0.30);
                ctx.lineTo(cx - s * 0.46, cy - s * 0.10);
                ctx.lineTo(cx - s * 0.12, cy + s * 0.06);
                ctx.lineTo(cx - s * 0.12, cy + s * 0.30);
                ctx.closePath();
                ctx.fill();
                return cv.toDataURL('image/png');
            }
            var ico192 = mkIcon(192),
                ico512 = mkIcon(512);

                    sizes: '512x512', type: 'image/png', purpose: 'any maskable' }]
            };
            var mb = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            var mel = document.getElementById('cp-manifest');
            if (mel) mel.href = URL.createObjectURL(mb);
            if ('serviceWorker' in navigator) {
                var swCode = 'const CACHE="cp-v3.7";' +

                    'self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(caches.match(e.request).then(cached=>{if(cached)return cached;return fetch(e.request).then(resp=>{if(resp&&(resp.status===200||resp.type==="opaque")){const cl=resp.clone();caches.open(CACHE).then(c=>c.put(e.request,cl)).catch(()=>{});}return resp;}).catch(()=>caches.match(e.request));}).catch(()=>fetch(e.request)));});' +
                    'self.addEventListener("message",e=>{if(e.data&&e.data.type==="CACHE_PAGE"){caches.open(CACHE).then(c=>c.add(new Request(e.data.url,{cache:"reload"})).catch(()=>{})).catch(()=>{});}});';
                var swBlob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: window.location.pathname }).then(
                    function(reg) {
                        var cache = function() { if (navigator.serviceWorker.controller) navigator.serviceWorker
                                .controller.postMessage({ type: 'CACHE_PAGE', url: window.location.href }); };
                        if (navigator.serviceWorker.controller) cache();
                        navigator.serviceWorker.addEventListener('controllerchange', cache);
                    }).catch(function() {});
            }
            window.cpDeferredPrompt = null;
            window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault();

    function getNow() { const n = new Date(); return { todayStr: n.toISOString().slice(0, 10), nowH: n.getHours(), nowMin: n.getMinutes() }; }

    function itemStatus(it) { const { todayStr, nowH, nowMin } = getNow(); if (!it.date) return 'future'; if (it.date < todayStr) return 'past'; if (it.date > todayStr) return 'future'; if (it._type === 'route' && it.departureTime && it.arrivalTime) { const now = nowH * 60 + nowMin; const toMin = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; }; if (now < toMin(it.departureTime)) return 'future'; if (now > toMin(it.arrivalTime)) return 'past'; return 'now'; } if (it.time) { const [h, m] = it.time.split(':').map(Number); if (nowH * 60 + nowMin < h * 60 + m) return 'future'; return 'past'; } return 'now'; }

    function renderNowPanel(nowWrapId) { const el = document.getElementById(nowWrapId); if (!el) return; const { todayStr } = getNow(); const activeRoutes = curRts().filter(r => r.date === todayStr && r.departureTime && r.arrivalTime && itemStatus({ ...r, _type: 'route' }) === 'now'); if (!activeRoutes.length) { el.innerHTML = ''; return; } let h = '';

    function setupDragAndDrop(container) { container.querySelectorAll('.card.draggable-place, .route-card.draggable-route').forEach(card => { card.addEventListener('dragstart', e => { const id = card.dataset.placeId || card.dataset.routeId;

    function showTripModal(editId) { const t = editId ? S.trips.find(x => x.id === editId) : null;

        modal(t ? 'Rediģēt' : 'Jauns ceļojums', `<div class="fg"><label class="fl">Nosaukums *</label><input class="inp" id="tm-n" value="${esc(t?t.name:'')}"></div><div class="fg"><label class="fl">Galamērķis</label><input class="inp" id="tm-d" value="${esc(t?t.destination||'':'')}"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="fl">Sākums</label><input class="inp" type="date" id="tm-s" value="${t?t.startDate||'':''}"></div><div><label class="fl">Beigas</label><input class="inp" type="date" id="tm-e" value="${t?t.endDate||'':''}"></div></div><div class="fg"><label class="fl">Krāsa</label><div class="swrow">${[1,2,3,4,5,6].map(c=>`<div class="sw ${grdC(c)}${selTripColor===c?' on':''}" onclick="pickTC(${c})"></div>`).join('')}</div></div><div class="macts"><button class="btn bg2" onclick="closeModal()">Atcelt</button><button class="btn bp" onclick="saveTrip('${editId||''}')">${t?'Saglabāt':'Izveidot'}</button></div>`); }

    function pickTC(c) { selTripColor = c;
        document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
        document.getElementById('sw-' + c)?.classList.add('on'); }

    function saveTrip(editId) { const name = (document.getElementById('tm-n').value || '').trim(); if (!name) { notif('Norādi nosaukumu!', 'err'); return; } const data = { name, destination: (document.getElementById('tm-d').value || '').trim(), startDate: document.getElementById('tm-s').value, endDate: document.getElementById('tm-e').value, color: selTripColor }; if (editId) { const t = S.trips.find(x => x.id === editId); if (t) Object.assign(t, data); } else { const nt = { id: uid(), ...data, cAt: Date.now() };
            S.trips.push(nt);
            S.tripId = nt.id; }
        save();
        closeModal();
        renderAll(); }

    async function delTrip(id) { const t = S.trips.find(x => x.id === id); if (!t) return; if (!await conf2(`Dzēst "${t.name}"?`)) return;
        S.trips = S.trips.filter(x => x.id !== id);
        S.places = S.places.filter(x => x.tripId !== id);
        S.docs = S.docs.filter(x => x.tripId !== id);
        S.routes = S.routes.filter(x => x.tripId !== id); if (S.tripId === id) S.tripId = S.trips.length ? S.trips[0].id : null;
        save();
        renderAll(); }

    function showPlaceModal(editId, prefill) { if (!S.tripId) { notif('Izvēlies ceļojumu!', 'err'); return; } const p = editId ? S.places.find(x => x.id === editId) : null; const pre = prefill || {}; const lat = p ? p.lat || '' : pre.lat || '',
            lng = p ? p.lng || '' : pre.lng || ''; const addr = p ? p.address || '' : pre.address || '',
            name = p ? p.name : pre.name || '';
        modal(p ? 'Rediģēt vietu' : 'Pievienot vietu', `<div class="fg"><label class="fl">Nosaukums *</label><input class="inp" id="pm-n" value="${esc(name)}"></div><div class="fg"><label class="fl">Tips</label><select class="inp" id="pm-t">${PT.map(t=>`<option value="${t.id}"${p?.type===t.id?' selected':''}>${t.ico} ${t.lbl}</option>`).join('')}</select></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="fl">Datums</label><input class="inp" type="date" id="pm-d" value="${p?p.date||'':''}"></div><div><label class="fl">Laiks</label><input class="inp" type="time" id="pm-ti" value="${p?p.time||'':''}"></div></div><div class="fg"><label class="fl">Adrese</label><input class="inp" id="pm-a" value="${esc(addr)}"><input type="hidden" id="pm-lat" value="${lat}"><input type="hidden" id="pm-lng" value="${lng}"></div><div class="macts"><button class="btn bg2" onclick="closeModal()">Atcelt</button><button class="btn bp" onclick="savePl('${editId||''}')">${p?'Saglabāt':'Pievienot'}</button></div>`); }

    function savePl(editId) { const name = (document.getElementById('pm-n').value || '').trim(); if (!name) { notif('Norādi nosaukumu!', 'err'); return; } const lat = parseFloat(document.getElementById('pm-lat').value) || null; const lng = parseFloat(document.getElementById('pm-lng').value) || null; const maxSo = Math.max(0, ...S.places.filter(p => p.tripId === S.tripId && p.date === document.getElementById('pm-d').value).map(p => p.sortOrder ?? 0)); const data = { tripId: S.tripId, name, type: document.getElementById('pm-t').value, date: document.getElementById('pm-d').value, time: document.getElementById('pm-ti').value, address: (document.getElementById('pm-a').value || '').trim(), lat, lng, sortOrder: editId ? (S.places.find(x => x.id === editId)?.sortOrder ?? maxSo + 1) : maxSo + 1, visited: false }; if (editId) { const p = S.places.find(x => x.id === editId); if (p) Object.assign(p, data); } else { S.places.push({ id: uid(), ...data, cAt: Date.now() }); }
        save();
        closeModal();
        renderPlan(S.isDesk ? 'd-plans-ct' : 'plans-ct', S.isDesk ? 'd-plans-sub' : 'plans-sub', S.isDesk); }

    async function delPlace(id) { if (!await conf2('Dzēst vietu?')) return;
        S.places = S.places.filter(x => x.id !== id);
        save();
        renderPlan(S.isDesk ? 'd-plans-ct' : 'plans-ct', S.isDesk ? 'd-plans-sub' : 'plans-sub', S.isDesk); }

    function showRouteModal(editId) { if (!S.tripId) { notif('Izvēlies ceļojumu!', 'err'); return; } const r = editId ? S.routes.find(x => x.id === editId) : null;
        modal(r ? 'Rediģēt lidojumu' : 'Pievienot lidojumu', `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="fl">Izlidošana *</label><input class="inp" id="r-from-q" value="${r?r.fromIata||'':''}" placeholder="RIX" oninput="apSearch('from',this.value)"><div class="ap-res" id="ap-from"></div><input type="hidden" id="r-flat" value="${r?r.fromLat||'':''}"><input type="hidden" id="r-fiata" value="${r?r.fromIata||'':''}"><input type="hidden" id="r-fname" value="${r?r.fromName||'':''}"></div><div><label class="fl">Ielidošana *</label><input class="inp" id="r-to-q" value="${r?r.toIata||'':''}" placeholder="CDG" oninput="apSearch('to',this.value)"><div class="ap-res" id="ap-to"></div><input type="hidden" id="r-tlat" value="${r?r.toLat||'':''}"><input type="hidden" id="r-tiata" value="${r?r.toIata||'':''}"><input type="hidden" id="r-tname" value="${r?r.toName||'':''}"></div></div><div><label class="fl">Datums</label><input class="inp" type="date" id="r-date" value="${r?r.date||'':''}"></div><div><label class="fl">Reisa nr.</label><input class="inp" id="r-fn" value="${esc(r?r.flightNumber||'':'')}"></div><div class="macts"><button class="btn bg2" onclick="closeModal()">Atcelt</button><button class="btn bp" onclick="saveRoute('${editId||''}')">${r?'Saglabāt':'Pievienot'}</button></div>`); }

    function apSearch(side, q) { const resEl = document.getElementById('ap-' + side); const results = searchAirports(q); if (!results.length || !q.trim()) { resEl.style.display = 'none'; return; }
        resEl.innerHTML = results.map(a => `<div class="ap-it" onclick="pickAp('${side}','${a[0]}','${esc(a[1])}',${a[4]},${a[5]})">${a[0]} ${esc(a[1])}</div>`).join('');
        resEl.style.display = 'block'; }

    function pickAp(side, iata, name, lat, lng) { const s = side === 'from' ? 'f' : 't';
        document.getElementById(`r-${s}lat`).value = lat;
        document.getElementById(`r-${s}iata`).value = iata;
        document.getElementById(`r-${s}name`).value = name;
        document.getElementById(`r-${side}-q`).value = iata;
        document.getElementById('ap-' + side).style.display = 'none'; }

    function saveRoute(editId) { const flat = parseFloat(document.getElementById('r-flat').value); const tlat = parseFloat(document.getElementById('r-tlat').value); if (!flat || !tlat) { notif('Izvēlies lidostas!', 'err'); return; } const data = { tripId: S.tripId, fromLat: flat, fromIata: document.getElementById('r-fiata').value, fromName: document.getElementById('r-fname').value, toLat: tlat, toIata: document.getElementById('r-tiata').value, toName: document.getElementById('r-tname').value, date: document.getElementById('r-date').value, flightNumber: (document.getElementById('r-fn').value || '').trim() }; if (editId) { const r = S.routes.find(x => x.id === editId); if (r) Object.assign(r, data); } else { S.routes.push({ id: uid(), ...data, cAt: Date.now() }); }
        save();
        closeModal();
        renderPlan(S.isDesk ? 'd-plans-ct' : 'plans-ct', S.isDesk ? 'd-plans-sub' : 'plans-sub', S.isDesk); }

    async function delRoute(id) { if (!await conf2('Dzēst lidojumu?')) return;
        S.routes = S.routes.filter(x => x.id !== id);
        save();
        renderPlan(S.isDesk ? 'd-plans-ct' : 'plans-ct', S.isDesk ? 'd-plans-sub' : 'plans-sub', S.isDesk); }

    function showDocModal(editId) { if (!S.tripId) return; const d = editId ? S.docs.find(x => x.id === editId) : null;
        selDocType = d ? d.type || 'lidojums' : 'lidojums';
        modal(d ? 'Rediģēt dokumentu' : 'Pievienot dokumentu', `<div class="fg"><label class="fl">Tips</label><div class="dtg">${DT.map(t=>`<button class="dtb${selDocType===t.id?' on':''}" onclick="pickDT('${t.id}')">${t.ico} ${t.lbl}</button>`).join('')}</div></div><div class="fg"><label class="fl">Nosaukums *</label><input class="inp" id="dm-n" value="${esc(d?d.title:'')}"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="fl">Datums</label><input class="inp" type="date" id="dm-d" value="${d?d.date||'':''}"></div><div><label class="fl">Sniedzējs</label><input class="inp" id="dm-pr" value="${esc(d?d.provider||'':'')}"></div></div><div class="fg"><label class="fl">Apstiprinājuma nr.</label><input class="inp" id="dm-cn" value="${esc(d?d.confirmationNumber||'':'')}"></div><div class="macts"><button class="btn bg2" onclick="closeModal()">Atcelt</button><button class="btn ba" onclick="saveDoc('${editId||''}')">${d?'Saglabāt':'Pievienot'}</button></div>`); }

    function pickDT(id) { selDocType = id;
        document.querySelectorAll('.dtb').forEach(b => b.classList.remove('on'));
        document.getElementById('dt-' + id)?.classList.add('on'); }

    function saveDoc(editId) { const title = (document.getElementById('dm-n').value || '').trim(); if (!title) { notif('Norādi nosaukumu!', 'err'); return; } const data = { tripId: S.tripId, type: selDocType, title, date: document.getElementById('dm-d').value, provider: (document.getElementById('dm-pr').value || '').trim(), confirmationNumber: (document.getElementById('dm-cn').value || '').trim() }; if (editId) { const d = S.docs.find(x => x.id === editId); if (d) Object.assign(d, data); } else { S.docs.push({ id: uid(), ...data, cAt: Date.now() }); }
        save();
        closeModal();
        renderDocs(S.isDesk ? 'd-docs-ct' : 'docs-ct', S.isDesk ? 'd-doc-filt' : 'doc-filt', S.isDesk); }

    async function delDoc(id) { if (!await conf2('Dzēst dokumentu?')) return;
        S.docs = S.docs.filter(x => x.id !== id);
        save();
        renderDocs(S.isDesk ? 'd-docs-ct' : 'docs-ct', S.isDesk ? 'd-doc-filt' : 'doc-filt', S.isDesk); }

    function modal(title, body) { closeModal();
        modalOpen = true; const ov = document.createElement('div');
        ov.className = 'mover';
        ov.innerHTML = `<div class="mbox"><div class="mhdl"></div><div class="mtit">${title}</div>${body}</div>`;
        document.getElementById('mroot').appendChild(ov);
        history.pushState({ modal: true }, ''); }
    const closeModal = () => { const r = document.getElementById('mroot'); if (r.lastChild) { r.lastChild.remove();
            modalOpen = false; if (history.state?.modal) history.back(); } };

    function conf2(msg) { return new Promise(res => { const ov = document.createElement('div');
            ov.className = 'mover';
            ov.innerHTML = `<div class="mbox" style="max-width:360px"><div class="mhdl"></div><p>${msg}</p><div style="display:flex;gap:10px"><button class="btn bg2" id="cc">Atcelt</button><button class="btn bd" id="co">Dzēst</button></div></div>`;
            document.getElementById('mroot').appendChild(ov);
            ov.querySelector('#cc').onclick = () => { ov.remove();
                res(false); };
            ov.querySelector('#co').onclick = () => { ov.remove();
                res(true); }; }); }

    function expJSON() { const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify({ trips: S.trips, places: S.places, docs: S.docs, routes: S.routes })], { type: 'application/json' }));
        a.download = 'celojums-' + new Date().toISOString().split('T')[0] + '.json';
        a.click(); }

    function impJSON(input) { const f = input.files[0]; if (!f) return; const r = new FileReader();
        r.onload = async e => { try { const data = JSON.parse(e.target.result); if (!await conf2('Importēt?')) return; if (data.trips) S.trips = data.trips; if (data.places) S.places = data.places; if (data.docs) S.docs = data.docs; if (data.routes) S.routes = data.routes; if (!S.tripId && S.trips.length) S.tripId = S.trips[0].id;
                save();
                renderAll(); } catch (e) {} };
        r.readAsText(f); }

    async function clearAll() { if (!await conf2('Dzēst VISUS datus?')) return;
        S.trips = [];
        S.places = [];
        S.docs = [];
        S.routes = [];
        S.tripId = null;
        save();
        renderAll(); }

    function toggleLayout() { S.isDesk = !S.isDesk;
        applyLayout();
        renderAll(); }

    function applyLayout() { const mob = document.getElementById('mob'),
            desk = document.getElementById('desk'); if (S.isDesk) { mob.style.display = 'none';
            desk.style.display = 'flex';
            document.body.classList.add('is-desk');
            ensureMapIn('dp-map'); } else { mob.style.display = 'flex';
            desk.style.display = 'none';
            document.body.classList.remove('is-desk');
            ensureMapIn('p-map'); } }

    function ensureMapIn(pid) { const mw = document.getElementById('map-wrap'),
            par = document.getElementById(pid); if (mw.parentElement !== par) { par.innerHTML = '';
            par.appendChild(mw); }
        mw.style.cssText = 'display:block;position:absolute;inset:0;'; }

    function switchTab(tab) { S.tab = tab; if (S.isDesk) { document.querySelectorAll('[id^="dp-"]').forEach(p => p.classList.remove('on'));
            document.querySelectorAll('.sn').forEach(b => b.classList.remove('on')); const dp = document.getElementById('dp-' + tab); if (dp) dp.classList.add('on'); const sn = document.getElementById('sn-' + tab); if (sn) sn.classList.add('on'); if (tab === 'map') { ensureMapIn('dp-map');
                setTimeout(() => LMAP?.invalidateSize(), 80);
                renderMap(); } else if (tab === 'plans') renderPlan('d-plans-ct', 'd-plans-sub', true); else if (tab === 'docs') renderDocs('d-docs-ct', 'd-doc-filt', true); else if (tab === 'trips') renderTrips('d-trips-ct'); else if (tab === 'set') renderSet('d-set-ct'); } else { document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('on')); const pane = document.getElementById('p-' + tab); if (pane) pane.classList.add('on'); const nb = document.getElementById('nb-' + tab); if (nb) nb.classList.add('on'); if (tab === 'map') { ensureMapIn('p-map');
                setTimeout(() => LMAP?.invalidateSize(), 80);
                renderMap(); } else if (tab === 'plans') renderPlan('plans-ct', 'plans-sub', false); else if (tab === 'docs') renderDocs('docs-ct', 'doc-filt', false); else if (tab === 'trips') renderTrips('trips-ct'); else if (tab === 'set') renderSet('set-ct'); } }

    function renderAll() { renderTBar();
        renderSbTrips();
        switchTab(S.tab); }

    function renderTBar() { const c = document.getElementById('tchips'); if (!c) return;
        c.innerHTML = '';
        S.trips.forEach(t => { const b = document.createElement('button');
            b.className = 'tchip' + (t.id === S.tripId ? ' on' : '');
            b.textContent = t.name;
            b.onclick = () => selTrip(t.id);
            c.appendChild(b); }); }

    function renderSbTrips() { const c = document.getElementById('sb-trips'); if (!c) return;
        c.innerHTML = S.trips.map(t => `<button class="stchip${t.id===S.tripId?' on':''}" onclick="selTrip('${t.id}')">${esc(t.name)}</button>`).join('') + '<button class="staddbtn" onclick="showTripModal()">+ Jauns</button>'; }
    const selTrip = id => { S.tripId = id;
        save();
        renderAll(); };

    function initPWABanner() { window.addEventListener('pwaReady', () => setTimeout(() => document.getElementById('pwa-banner').classList.add('show'), 3000)); }

    function hidePwaBanner() { document.getElementById('pwa-banner').classList.remove('show');
        localStorage.setItem('cp5_pwa_dismissed', Date.now()); }

    function triggerPwaInstall() { if (window.cpDeferredPrompt) { window.cpDeferredPrompt.prompt();
            window.cpDeferredPrompt = null;
            hidePwaBanner(); } }

    function lvmd(ds) { if (!ds) return '';
        const d = new Date(ds + 'T12:00:00'); const M = ['Jan', 'Feb', 'Mar', 'Apr', 'Mai', 'Jūn', 'Jūl', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec']; const D = ['Sv', 'P', 'O', 'T', 'C', 'Pk', 'S']; return `${D[d.getDay()]}, ${d.getDate()}. ${M[d.getMonth()]}`; }

    function gcArc(lat1, lng1, lat2, lng2, n = 60) { const R2D = 180 / Math.PI,
            D2R = Math.PI / 180; const f1 = lat1 * D2R,
            l1 = lng1 * D2R,
            f2 = lat2 * D2R,
            l2 = lng2 * D2R; const df = f2 - f1,
            dl = l2 - l1; const a = Math.sin(df / 2) ** 2 + Math.cos(f1) * Math.cos(f2) * Math.sin(dl / 2) ** 2; const d = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); if (d < 0.001) return [
            [lat1, lng1],
            [lat2, lng2]
        ]; const pts = []; for (let i = 0; i <= n; i++) { const f = i / n; const A = Math.sin((1 - f) * d) / Math.sin(d),
                B = Math.sin(f * d) / Math.sin(d); const x = A * Math.cos(f1) * Math.cos(l1) + B * Math.cos(f2) * Math.cos(l2); const y = A * Math.cos(f1) * Math.sin(l1) + B * Math.cos(f2) * Math.sin(l2); const z = A * Math.sin(f1) + B * Math.sin(f2);
            pts.push([Math.atan2(z, Math.sqrt(x * x + y * y)) * R2D, Math.atan2(y, x) * R2D]); } return pts; }

    function doSearch() { const q = document.getElementById('ms-inp').value.trim(); if (!q) return;
        fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=1`).then(r => r.json()).then(data => { const f = (data.features || [])[0]; if (!f) return; const [lng, lat] = f.geometry.coordinates; const pr = f.properties;
            pickAc(lat, lng, pr.name || q, [pr.street, pr.city, pr.country].filter(Boolean).join(', ')); }); }

    function pickAc(lat, lng, name, addr) { document.getElementById('ms-inp').value = name || addr;
        pendingClick = { lat, lng, address: addr, name };
        showClickPop(addr); if (LMAP) LMAP.setView([lat, lng], 15); }

    function clearSearch() { document.getElementById('ms-inp').value = '';
        hideClickPop(); }

    function showClickPop(addr) { document.getElementById('mcp-addr').textContent = addr || '';
        document.getElementById('mcp').style.display = 'block'; }

    function hideClickPop() { document.getElementById('mcp').style.display = 'none';
        pendingClick = null; }

    function addFromClick() { if (!pendingClick) return;
        hideClickPop();
        showPlaceModal(null, pendingClick); }

    function notif(msg, type) { const n = document.createElement('div');
        n.className = 'nf ' + (type || '');
        n.textContent = msg;
        document.getElementById('nwrap').appendChild(n);
        setTimeout(() => n.remove(), 3000); }

    function syncUp() { notif('Sinhronizācija nav konfigurēta'); }

    function syncDown() { notif('Sinhronizācija nav konfigurēta'); }
    document.addEventListener('DOMContentLoaded', () => { load();
        applyTheme(S.theme);
        applyFont(S.font);
        applyFontSize(S.fontSize);
        applyLayout();
        initLeaflet();
        S.isDesk = window.innerWidth >= 900;
        applyLayout();
        renderAll();
        initPWABanner();
        window.addEventListener('resize', () => { const wasDesk = S.isDesk;
            S.isDesk = window.innerWidth >= 900; if (S.isDesk !== wasDesk) { applyLayout();
                renderAll(); } });
        history.replaceState({ app: true }, '', location.href);
        window.addEventListener('popstate', e => { if (modalOpen) { closeModal(); } else { history.pushState({ app: true }, '', location.href); } }); });
    </script>
