<!DOCTYPE html>
<html lang="lv">
<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }
        body {
            font-family: var(--ff);
            font-size: 15px;
            color: var(--tx);
            background: var(--bg);
            transition: background .3s, color .3s;
        }
        button,
        input,
        select,
        textarea {
            font-family: var(--ff);
            font-size: 14px;
        }
        h1,
        h2,
        h3,
        .serif {
            font-family: var(--ffs);
        }
        :root {
            --P: #1A5F58;
            --Pd: #134A44;
            --Pl: #E6F5F4;
            --A: #D4712E;
            --Al: #FEF0E6;
            --bg: #F5F1EB;
            --sur: #ffffff;
            --br: #E0D9CF;
            --brl: #EDE8E0;
            --tx: #1C1C2E;
            --mu: #7A7A8C;
            --ff: 'DM Sans', system-ui, sans-serif;
            --ffs: 'Lora', Georgia, serif;
            --H: 60px;
            --TB: 48px;
            --NAV: 78px;
            --SW: 212px;
            --SWC: 52px;
        }
        [data-theme=dark] {
            --P: #2A9D8F;
            --Pd: #1F7A74;
            --Pl: #1E3A3A;
            --A: #F4A261;
            --Al: #3D2A15;
            --bg: #0F172A;
            --sur: #1E293B;
            --br: #334155;
            --brl: #263148;
            --tx: #F1F5F9;
            --mu: #94A3B8;
        }
        [data-theme=white] {
            --P: #1A5F58;
            --Pd: #134A44;
            --Pl: #E6F5F4;
            --A: #D4712E;
            --bg: #FFFFFF;
            --sur: #F8FAFB;
            --br: #E2E8F0;
            --brl: #EEF2F7;
            --tx: #0F172A;
            --mu: #64748B;
        }
        [data-font=system] {
            --ff: system-ui, -apple-system, 'Segoe UI', sans-serif;
            --ffs: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        #shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        #hdr {
            flex: 0 0 var(--H);
            height: var(--H);
            background: var(--P);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 200;
            box-shadow: 0 2px 14px rgba(0, 0, 0, .18);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-ico {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo-name {
            font-family: var(--ffs);
            font-weight: 700;
            color: #fff;
            font-size: 16px;
            line-height: 1.1;
        }
        .logo-ver {
            display: none;
        }
        .hdr-r {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hbtn {
            background: rgba(255, 255, 255, .14);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background .2s;
        }
        .hbtn:hover {
            background: rgba(255, 255, 255, .26);
        }
        .hico {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .12);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s;
        }
        .hico:hover {
            background: rgba(255, 255, 255, .26);
        }
        .dot-on {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ADE80;
            box-shadow: 0 0 5px #4ADE80;
        }
        .dot-off {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #F87171;
        }
        #body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        #mob {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        #tbar {
            flex: 0 0 var(--TB);
            height: var(--TB);
            background: var(--Pd);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        #tbar::-webkit-scrollbar {
            display: none;
        }
        .tchip {
            flex-shrink: 0;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid transparent;
            white-space: nowrap;
            color: rgba(255, 255, 255, .65);
            background: rgba(255, 255, 255, .09);
            transition: all .2s;
        }
        .tchip.on {
            color: var(--P);
            background: #fff;
        }
        .tchip:hover:not(.on) {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }
        .tadd {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .12);
            border: 1.5px solid rgba(255, 255, 255, .3);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .tadd:hover {
            background: rgba(255, 255, 255, .26);
        }
        #ca {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .pane {
            position: absolute;
            inset: 0;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .pane.on {
            display: block;
        }
        #p-map {
            overflow: hidden;
        }
        #bnav {
            flex: 0 0 var(--NAV);
            height: var(--NAV);
            background: var(--sur);
            border-top: 1px solid var(--br);
            display: flex;
            align-items: center;
            padding: 6px 8px;
            gap: 4px;
            padding-bottom: calc(6px + env(safe-area-inset-bottom, 0));
            box-shadow: 0 -2px 20px rgba(0, 0, 0, .08);
        }
        .nb {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--mu);
            font-size: 10px;
            font-weight: 600;
            border-radius: 16px;
            padding: 8px 4px;
            transition: all .2s;
            min-height: 52px;
        }
        .nb.on {
            color: var(--P);
            background: var(--Pl);
        }
        .nb svg {
            transition: transform .2s;
        }
        .nb.on svg {
            transform: scale(1.1);
        }
        .nb:hover:not(.on) {
            color: var(--tx);
            background: var(--bg);
        }
        #desk {
            display: none;
            width: 100%;
            height: 100%;
        }
        #sb {
            flex: 0 0 var(--SW);
            width: var(--SW);
            height: 100%;
            background: var(--sur);
            border-right: 1px solid var(--br);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width .22s, flex-basis .22s;
        }
        #sb.col {
            flex-basis: var(--SWC);
            width: var(--SWC);
        }
        .sb-top {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 8px;
            border-bottom: 1px solid var(--brl);
        }
        .sb-cbtn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--mu);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
        }
        .sb-cbtn:hover {
            background: var(--bg);
            color: var(--tx);
        }
        .sb-trips {
            flex: 0 0 auto;
            padding: 8px;
            border-bottom: 1px solid var(--brl);
        }
        .sbl {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--mu);
            padding: 2px 6px 6px;
            white-space: nowrap;
            overflow: hidden;
            display: block;
        }
        .stchip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            color: var(--mu);
            white-space: nowrap;
            overflow: hidden;
            transition: all .15s;
        }
        .stchip.on {
            background: var(--Pl);
            color: var(--P);
            font-weight: 600;
        }
        .stchip:hover:not(.on) {
            background: var(--bg);
            color: var(--tx);
        }
        .stdot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .staddbtn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--mu);
            border: 1.5px dashed var(--br);
            background: transparent;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            transition: all .15s;
            white-space: nowrap;
            overflow: hidden;
        }
        .staddbtn:hover {
            border-color: var(--P);
            color: var(--P);
            background: var(--Pl);
        }
        .sb-nav {
            flex: 1;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }
        .sn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            color: var(--mu);
            white-space: nowrap;
            overflow: hidden;
            transition: all .15s;
        }
        .sn.on {
            background: var(--Pl);
            color: var(--P);
            font-weight: 600;
        }
        .sn:hover:not(.on) {
            background: var(--bg);
            color: var(--tx);
        }
        .sn svg {
            flex-shrink: 0;
        }
        .snlbl {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sb-foot {
            padding: 8px 12px;
            font-size: 10px;
            color: var(--br);
            border-top: 1px solid var(--brl);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }
        #dm {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-width: 0;
            height: 100%;
        }
        .dp {
            position: absolute;
            inset: 0;
            display: none;
            overflow-y: auto;
        }
        .dp.on {
            display: block;
        }
        #dp-map {
            overflow: hidden;
        }
        #map-wrap {
            position: absolute;
            inset: 0;
        }
        #lmap {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #e8e4dc;
        }
        #msbar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 800;
            width: calc(100% - 24px);
            max-width: 500px;
        }
        #msbar-row {
            display: flex;
            gap: 6px;
            position: relative;
        }
        #ms-inp {
            flex: 1;
            padding: 10px 16px;
            border-radius: 50px;
            border: none;
            background: var(--sur);
            box-shadow: 0 2px 14px rgba(0, 0, 0, .22);
            font-size: 14px;
            outline: none;
            color: var(--tx);
        }
        #ms-inp::placeholder {
            color: var(--mu);
        }
        #ms-clr {
            width: 36px;
            height: 44px;
            border-radius: 50px;
            background: transparent;
            border: none;
            color: var(--mu);
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            position: absolute;
            right: 54px;
            top: 0;
        }
        #ms-clr.show {
            display: flex;
        }
        #ms-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--P);
            color: #fff;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }
        #ms-btn:hover {
            background: var(--Pd);
        }
        #ms-ac {
            position: absolute;
            top: 50px;
            left: 0;
            right: 54px;
            background: var(--sur);
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, .18);
            overflow: hidden;
            display: none;
            z-index: 900;
            max-height: 260px;
            overflow-y: auto;
        }
        #ms-ac.show {
            display: block;
        }
        .ac-it {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid var(--bg);
            transition: background .15s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--tx);
        }
        .ac-it:last-child {
            border-bottom: none;
        }
        .ac-it:hover {
            background: var(--Pl);
        }
        .ac-ico {
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .ac-name {
            font-weight: 600;
        }
        .ac-sub {
            font-size: 11px;
            color: var(--mu);
        }
        #map-ctrls{position:absolute;top:68px;right:12px;z-index:800;display:flex;flex-direction:column;gap:6px;}
        .map-ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--sur);
            border: 1px solid var(--br);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .12);
            transition: background .15s;
            color: var(--tx);
        }
        .map-ctrl-btn:hover {
            background: var(--Pl);
            color: var(--P);
        }
        #mleg {
            position: absolute;
            bottom: 80px;
            left: 12px;
            z-index: 800;
            background: var(--sur);
            border-radius: 14px;
            padding: 10px 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .1);
            font-size: 12px;
            display: none;
            color: var(--tx);
        }
        #mcp {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 800;
            background: var(--sur);
            border-radius: 18px;
            padding: 14px 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .2);
            display: none;
            min-width: 240px;
            max-width: 320px;
            color: var(--tx);
        }
        .mfab {
            position: absolute;
            right: 16px;
            z-index: 800;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
            transition: transform .2s;
        }
        .mfab:hover {
            transform: scale(1.08);
        }
        .mfab-add {
            bottom: 20px;
            background: var(--A);
            color: #fff;
            font-size: 26px;
        }
        .mfab-route {
            bottom: 78px;
            background: var(--P);
            color: #fff;
            font-size: 18px;
        }
        .leaflet-popup-content-wrapper {
            border-radius: 16px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .18) !important;
            padding: 0 !important;
            background: var(--sur) !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
        }
        .lpop {
            padding: 14px 16px;
            font-family: var(--ff);
            min-width: 180px;
            color: var(--tx);
        }
        .spad {
            padding: 16px 18px 88px;
        }
        .dpad {
            padding: 24px 32px 88px;
            max-width: 1100px;
        }
        .sh {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 4px;
            color: var(--tx);
        }
        .ss {
            font-size: 13px;
            color: var(--mu);
            margin: 0 0 18px;
        }
        .card {
            background: var(--sur);
            border-radius: 14px;
            padding: 10px 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .06);
            border: 1px solid var(--br);
            margin-bottom: 8px;
            transition: box-shadow .2s, transform .15s;
            overflow: hidden;
        }
        .card.drag-over {
            box-shadow: 0 0 0 3px var(--P);
            transform: scale(1.02);
        }
        .card.dragging {
            opacity: 0.5;
            transform: scale(0.97);
        }
        .drag-handle {
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            color: var(--mu);
            flex-shrink: 0;
            transition: background .15s;
        }
        .drag-handle:hover {
            background: var(--bg);
            color: var(--tx);
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .crow {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }
        .ctit {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 2px;
            color: var(--tx);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .csub {
            font-size: 11px;
            color: var(--mu);
            margin: 0;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cacts {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .ibt {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mu);
            transition: background .15s, color .15s;
        }
        .ibt:hover {
            background: #E8E2D9;
            color: var(--tx);
        }
        .ibt.del:hover {
            background: #FEE2E2;
            color: #DC2626;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.5;
        }
        .b-attraction {
            background: #EBF4FF;
            color: #1E40AF;
        }
        .b-hotel {
            background: #F5F3FF;
            color: #6D28D9;
        }
        .b-restaurant {
            background: #FFF7ED;
            color: #C2410C;
        }

    <script>
    'use strict';
    const PT = [{ id: 'attraction', lbl: 'Apskates objekts', ico: '🏛️' }, { id: 'hotel', lbl: 'Naktsmītne', ico: '🏨' }, { id: 'restaurant', lbl: 'Restorāns', ico: '🍽️' }, { id: 'transport', lbl: 'Transports', ico: '🚌' }, { id: 'activity', lbl: 'Aktivitāte', ico: '🎭' }, { id: 'other', lbl: 'Cits', ico: '📍' }];
    const DT = [{ id: 'lidojums', lbl: 'Lidojuma biļete', ico: '✈️' }, { id: 'vilciens', lbl: 'Vilciena biļete', ico: '🚂' }, { id: 'autobuss', lbl: 'Autobusa biļete', ico: '🚌' }, { id: 'kruizs', lbl: 'Kruīzs / Kuģis', ico: '🚢' }, { id: 'viesnca', lbl: 'Viesnīcas rezervācija', ico: '🏨' }, { id: 'auto_noma', lbl: 'Auto noma', ico: '🚗' }, { id: 'restorns', lbl: 'Restorāna rezerv.', ico: '🍽️' }, { id: 'pasak', lbl: 'Pasākuma biļete', ico: '🎭' }, { id: 'apdrosh', lbl: 'Apdrošināšana', ico: '🛡️' }, { id: 'viza', lbl: 'Vīza / Dokuments', ico: '📋' }, { id: 'vauceris', lbl: 'Vaučers', ico: '🎫' }, { id: 'cits', lbl: 'Cits', ico: '📄' }];
    const GRDS = ['g1', 'g2', 'g3', 'g4', 'g5', 'g6'];
    const DOT_COL = ['#1A5F58', '#D4712E', '#5B21B6', '#1E40AF', '#9A3412', '#14532D'];
    const TILE_LAYERS = {
        'osm': { name: 'OpenStreetMap (standarta)', url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr: '© OpenStreetMap' },
        'carto_light': { name: 'CartoDB Gaišais', url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr: '© CartoDB' },
        'carto_dark': { name: 'CartoDB Tumšais', url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attr: '© CartoDB' },
        'topo': { name: 'OpenTopoMap (topogrāfija)', url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', attr: '© OpenTopoMap' }
    };
    // No static airport list – we use online search

    const THEMES = [{ id: 'white', label: 'Baltais', color: '#FFFFFF' }, { id: 'teal', label: 'Zaļais', color: '#1A5F58' }, { id: 'dark', label: 'Tumšais', color: '#0F172A' }];
    const DAY_COLORS = ['#1A5F58', '#2563EB', '#7C3AED', '#C2410C', '#0891B2', '#065F46', '#BE123C', '#854D0E', '#1D4ED8', '#6D28D9'];

    function dayColor(idx) { return DAY_COLORS[idx % DAY_COLORS.length]; }
    let S = { trips: [], places: [], docs: [], routes: [], tripId: null, tab: 'map', syncUrl: '', autoSync: false, isDesk: false, sbCol: false, docFilter: 'all', theme: 'teal', font: 'app', fontSize: 1, mapSystem: 'osm', tileLayer: 'osm', syncingUp: false, mapDateFilter: 'all' };
    let LMAP = null,
        L_TILE = null,
        L_MARKERS = [],
        L_ROUTE_LAYERS = [],
        L_ARC_LAYERS = [];
    let pendingClick = null,
        searchPin = null,
        acTimer = null,
        lastAcQ = '';
    let selDocType = 'lidojums',
        selTripColor = 1;
    let modalOpen = false;
    let draggedPlaceId = null;
    let pushHistory = true;
    // airport cache for online lookups
    let airportCache = new Map();

    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const fd = d => { if (!d) return '';
        const [y, m, dd] = d.split('-'); return `${dd}.${m}.${y}`; };
    const fdr = (s, e) => s && e ? `${fd(s)}–${fd(e)}` : fd(s || e);
    const dbw = (s, e) => s && e ? Math.round((new Date(e) - new Date(s)) / 86400000) + 1 : null;
    const getPT = id => PT.find(t => t.id === id) || PT[5];
    const getDT = id => DT.find(t => t.id === id) || DT[DT.length - 1];
    const curT = () => S.trips.find(t => t.id === S.tripId) || null;
    const dotC = c => DOT_COL[((c || 1) - 1) % 6];
    const grdC = c => GRDS[((c || 1) - 1) % 6];
    const emH = (ico, msg, act = '') => `<div class="empty"><div class="eico">${ico}</div><p>${msg}</p>${act}</div>`;

    function lvmd(ds) { if (!ds) return '';
        const d = new Date(ds + 'T12:00:00'); const M = ['Jan', 'Feb', 'Mar', 'Apr', 'Mai', 'Jūn', 'Jūl', 'Aug', 'Sep', 'Okt', 'Nov', 'Dec']; const D = ['Sv', 'P', 'O', 'T', 'C', 'Pk', 'S']; return `${D[d.getDay()]}, ${d.getDate()}. ${M[d.getMonth()]}`; }

    function curPl() { if (!S.tripId) return []; return S.places.filter(p => p.tripId === S.tripId).sort((a, b) => { if (a.date && b.date && a.date !== b.date) return a.date < b.date ? -1 : 1; const soA = a.sortOrder ?? 9999,
                soB = b.sortOrder ?? 9999; if (soA !== soB) return soA - soB; if (a.time && b.time) return a.time < b.time ? -1 : 1; return (a.cAt || 0) - (b.cAt || 0); }); }

    function curRts() { if (!S.tripId) return []; return S.routes.filter(r => r.tripId === S.tripId).sort((a, b) => (a.date || '') < (b.date || '') ? -1 : 1); }
    const curDocs = () => !S.tripId ? [] : S.docs.filter(d => d.tripId === S.tripId).sort((a, b) => (a.date || '') < (b.date || '') ? -1 : 1);

    function gcArc(lat1, lng1, lat2, lng2, n = 60) { const R2D = 180 / Math.PI,
            D2R = Math.PI / 180; const f1 = lat1 * D2R,
            l1 = lng1 * D2R,
            f2 = lat2 * D2R,
            l2 = lng2 * D2R; const df = f2 - f1,
            dl = l2 - l1; const a = Math.sin(df / 2) ** 2 + Math.cos(f1) * Math.cos(f2) * Math.sin(dl / 2) ** 2; const d = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); if (d < 0.001) return [
            [lat1, lng1],
            [lat2, lng2]
        ]; const pts = []; for (let i = 0; i <= n; i++) { const f = i / n; const A = Math.sin((1 - f) * d) / Math.sin(d),
                B = Math.sin(f * d) / Math.sin(d); const x = A * Math.cos(f1) * Math.cos(l1) + B * Math.cos(f2) * Math.cos(l2); const y = A * Math.cos(f1) * Math.sin(l1) + B * Math.cos(f2) * Math.sin(l2); const z = A * Math.sin(f1) + B * Math.sin(f2);
            pts.push([Math.atan2(z, Math.sqrt(x * x + y * y)) * R2D, Math.atan2(y, x) * R2D]); } for (let i = 1; i < pts.length; i++) { while (pts[i][1] - pts[i - 1][1] > 180) pts[i][1] -= 360; while (pts[i][1] - pts[i - 1][1] < -180) pts[i][1] += 360; } return pts; }

    function gcDist(lat1, lng1, lat2, lng2) { const D2R = Math.PI / 180; const f1 = lat1 * D2R,
            f2 = lat2 * D2R,
            dl = (lng2 - lng1) * D2R; const a = Math.sin((f2 - f1) / 2) ** 2 + Math.cos(f1) * Math.cos(f2) * Math.sin(dl / 2) ** 2; return Math.round(6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); }

    function gcTime(dist) { const h = Math.floor(dist / 900),
            m = Math.round((dist % 900) / 900 * 60); return m ? `~${h}h ${m}min` : `~${h}h`; }

    async function searchAirportsOnline(q) {
        q = q.trim().toUpperCase();
        if (!q) return [];
        if (airportCache.has(q)) return airportCache.get(q);
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}+airport&format=json&limit=5`;
            const resp = await fetch(url);
            const data = await resp.json();
            const results = data.map(f => {
                const name = f.display_name.split(',')[0];
                return [q, name, f.display_name, '??', parseFloat(f.lat), parseFloat(f.lon)];
            });
            airportCache.set(q, results);
            return results;
        } catch(e) { return []; }
    }

    function save() { try { localStorage.setItem('cp5_trips', JSON.stringify(S.trips));
            localStorage.setItem('cp5_places', JSON.stringify(S.places));
            localStorage.setItem('cp5_docs', JSON.stringify(S.docs));
            localStorage.setItem('cp5_routes', JSON.stringify(S.routes));
            localStorage.setItem('cp5_tripId', S.tripId || '');
            localStorage.setItem('cp5_tileLayer', S.tileLayer || 'osm'); } catch (e) {} }

    function load() { try { S.trips = JSON.parse(localStorage.getItem('cp5_trips') || '[]');
            S.places = JSON.parse(localStorage.getItem('cp5_places') || '[]');
            S.docs = JSON.parse(localStorage.getItem('cp5_docs') || '[]');
            S.routes = JSON.parse(localStorage.getItem('cp5_routes') || '[]');
            S.tripId = localStorage.getItem('cp5_tripId') || null;
            S.syncUrl = localStorage.getItem('cp5_syncUrl') || '';
            S.autoSync = localStorage.getItem('cp5_autoSync') === 'true';
            S.sbCol = localStorage.getItem('cp5_sbcol') === 'true';
            S.theme = localStorage.getItem('cp5_theme') || 'teal'; if (!['white', 'teal', 'dark'].includes(S.theme)) S.theme = 'teal';
            S.font = localStorage.getItem('cp5_font') || 'app';
            S.fontSize = parseFloat(localStorage.getItem('cp5_fontSize') || '1');
            S.mapSystem = 'osm';
            S.tileLayer = localStorage.getItem('cp5_tileLayer') || 'osm';
            S.mapDateFilter = localStorage.getItem('cp5_mapdf') || 'all'; if (S.tripId && !S.trips.find(t => t.id === S.tripId)) S.tripId = null; if (!S.tripId && S.trips.length) S.tripId = S.trips[0].id; } catch (e) {} }

    function applyTheme(t) { S.theme = t;
        localStorage.setItem('cp5_theme', t);
        document.documentElement.setAttribute('data-theme', t === 'teal' ? '' : t); }

    function applyFont(f) { S.font = f;
        localStorage.setItem('cp5_font', f);
        document.documentElement.setAttribute('data-font', f === 'app' ? '' : f);
        document.querySelectorAll('.fntbtn').forEach(b => b.classList.remove('on')); const act = document.getElementById('fnt-' + f); if (act) act.classList.add('on'); }

    function applyFontSize(scale) { document.documentElement.style.setProperty('--fs-scale', scale); const lbl = document.getElementById('fs-preview-lbl'); if (lbl) lbl.textContent = Math.round(scale * 100) + '%'; }

    function changeFontSize(delta) { const cur = S.fontSize || 1; const next = Math.max(0.7, Math.min(1.5, Math.round((cur + delta) * 10) / 10));
        S.fontSize = next;
        localStorage.setItem('cp5_fontSize', next);
        applyFontSize(next); }

    function resetFontSize() { S.fontSize = 1;
        localStorage.setItem('cp5_fontSize', '1');
        applyFontSize(1); }

    function switchTileLayer(layerId) { S.tileLayer = layerId;
        localStorage.setItem('cp5_tileLayer', layerId); if (LMAP && L_TILE) { LMAP.removeLayer(L_TILE); const tl = TILE_LAYERS[layerId] || TILE_LAYERS['osm'];
            L_TILE = L.tileLayer(tl.url, { attribution: tl.attr, maxZoom: 19 }).addTo(LMAP); }
        document.querySelectorAll('.tile-opt').forEach(b => b.classList.remove('on'));
        document.getElementById('tile-' + layerId)?.classList.add('on'); }

    function initLeaflet() { if (LMAP) return; const el = document.getElementById('lmap');
        LMAP = L.map(el, { zoomControl: false, center: [56.946, 24.106], zoom: 7 }); const tl = TILE_LAYERS[S.tileLayer] || TILE_LAYERS['osm'];
        L_TILE = L.tileLayer(tl.url, { attribution: tl.attr, maxZoom: 19 }).addTo(LMAP);
        LMAP.on('click', e => { if (!S.tripId) { notif('Vispirms izvēlies ceļojumu!', 'err'); return; }
            revGeo(e.latlng.lat, e.latlng.lng, addr => { pendingClick = { lat: e.latlng.lat, lng: e.latlng.lng, address: addr, name: '' };
                showClickPop(addr); }); });
        LMAP.on('click', hideAc);
        renderMap(); }

    function renderMap() { renderLeafletMap(); }

    function renderLeafletMap() { if (!LMAP) return;
        L_MARKERS.forEach(m => m.remove());
        L_MARKERS = [];
        L_ROUTE_LAYERS.forEach(l => l.remove());
        L_ROUTE_LAYERS = [];
        L_ARC_LAYERS.forEach(l => l.remove());
        L_ARC_LAYERS = []; const places = curPl().filter(p => p.lat && p.lng); const routes = curRts().filter(r => r.fromLat && r.toLat); const leg = document.getElementById('mleg'); if (leg) leg.style.display = (places.length || routes.length) ? 'block' : 'none'; const bounds = [];
        places.forEach((p, i) => { const col = p.visited ? '#4ADE80' : '#1A5F58'; const icon = L.divIcon({ className: '', html: `<div style="background:${col};color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2.5px solid #fff;cursor:pointer">${i+1}</div>`, iconSize: [34, 34], iconAnchor: [17, 17] }); const m = L.marker([p.lat, p.lng], { icon }).addTo(LMAP);
            m.bindPopup(`<div class="lpop"><div class="lpop-name">${getPT(p.type).ico} ${esc(p.name)}</div>${p.address?`<div>📍 ${esc(p.address)}</div>`:''}<div class="lpop-btns"><button class="lpop-btn" style="background:var(--P);color:#fff" onclick="LMAP.closePopup();showPlaceModal('${p.id}')">✏️</button><button class="lpop-btn" style="background:${p.visited?'#F3F4F6':'#DCFCE7'};color:${p.visited?'#6B7280':'#166534'}" onclick="toggleV('${p.id}')">${p.visited?'Neatmeklēts':'✓'}</button></div></div>`, { maxWidth: 280 });
            L_MARKERS.push(m);
            bounds.push([p.lat, p.lng]); });
        // REMOVED: the green dashed line connecting places (no longer drawn)
        routes.forEach(r => { const pts = gcArc(r.fromLat, r.fromLng, r.toLat, r.toLng, 80);
            L_ARC_LAYERS.push(L.polyline(pts, { color: '#D4712E', weight: 2, opacity: .7, dashArray: '6,4' }).addTo(LMAP));

    function fitAll() { const places = curPl().filter(p => p.lat && p.lng); const routes = curRts().filter(r => r.fromLat && r.toLat); if (!places.length && !routes.length) { notif('Nav vietu kartē', 'err'); return; } if (LMAP) { const pts = [...places.map(p => [p.lat, p.lng]), ...routes.flatMap(r => [

    function goToMyLocation() { const btn = document.getElementById('loc-btn'); if (navigator.permissions) { navigator.permissions.query({ name: 'geolocation' }).then(result => { if (result.state === 'denied') { showLocFallback(); return; }

    function doGeolocate(btn) { if (!navigator.geolocation) { showLocFallback(); return; } if (btn) { btn.textContent = '⏳';

            res.innerHTML = feats.map(f => { const [lng, lat] = f.geometry.coordinates; const pr = f.properties; return `<div class="ap-it" onclick="goToCoords(${lat},${lng})">${esc([pr.name,pr.city,pr.country].filter(Boolean).join(', '))}</div>`; }).join(''); } catch (e) { res.innerHTML = 'Kļūda'; } }

    function getNow() { const n = new Date(); return { nowMs: n.getTime(), todayStr: n.toISOString().slice(0, 10), nowTimeStr: n.toTimeString().slice(0, 5), nowH: n.getHours(), nowMin: n.getMinutes() }; }

    function itemStatus(it) { const { nowMs, todayStr, nowTimeStr } = getNow(); if (!it.date) return 'future'; if (it.date < todayStr) return 'past'; if (it.date > todayStr) return 'future'; if (it._type === 'route') { if (it.departureTime && it.arrivalTime) { if (nowTimeStr < it.departureTime) return 'future'; if (nowTimeStr > it.arrivalTime) return 'past'; return 'now'; } return 'now'; } if (it.time) { if (nowTimeStr < it.time) return 'future'; const [h, m] = it.time.split(':').map(Number); if (nowMs - new Date().setHours(h, m, 0, 0) < 7200000) return 'now'; return 'past'; } return 'now'; }

    function flightProgress(r) { const { todayStr, nowH, nowMin } = getNow(); if (r.date !== todayStr) return null; if (!r.departureTime || !r.arrivalTime) return 50; const toMin = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; }; const dep = toMin(r.departureTime),
            arr = toMin(r.arrivalTime); const now = nowH * 60 + nowMin; if (now <= dep) return 0; if (now >= arr) return 100; return Math.round((now - dep) / (arr - dep) * 100); }

    function renderNowPanel(nowWrapId) { const el = document.getElementById(nowWrapId); if (!el) return; const { todayStr } = getNow(); const trip = curT(); if (!trip) return; const activeRoutes = curRts().filter(r => { if (r.date !== todayStr) return false; if (r.departureTime && r.arrivalTime) { const { nowH, nowMin } = getNow(); const nm = nowH * 60 + nowMin; const toMin = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; }; return nm >= toMin(r.departureTime) && nm <= toMin(r.arrivalTime); } return false; }); if (!activeRoutes.length) { el.innerHTML = ''; return; } let h = '';
        activeRoutes.forEach(r => { const pct = flightProgress(r); const dist = gcDist(r.fromLat, r.fromLng, r.toLat, r.toLng);
            h += `<div style="background:linear-gradient(135deg,var(--P),var(--A));border-radius:18px;padding:16px;color:#fff;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">✈️</span><div><div style="font-weight:700">${r.fromIata}→${r.toIata} · Ceļā!</div><div style="font-size:12px;opacity:.8">${esc(r.fromName)} → ${esc(r.toName)}</div></div></div><div class="flight-progress-bar"><div class="flight-progress-fill" style="width:${pct}%"></div></div><div style="text-align:center;font-size:12px;opacity:.8">${Math.round(dist*pct/100)} km no ${dist} km</div></div>`; });
        el.innerHTML = h; }

    // UPDATED: renderPlan now includes sortOrder for routes and drag/drop for all items
    function renderPlan(ctId, subId, desk) { const ct = document.getElementById(ctId); if (!ct) return; const sub = document.getElementById(subId); const trip = curT(); const nowWrapId = desk ? 'd-plans-now-wrap' : 'plans-now-wrap'; if (!trip) { if (sub) sub.textContent = 'Nav izvēlēts ceļojums';
            ct.innerHTML = emH('🗺️', 'Izvēlies vai pievieno ceļojumu');
            renderNowPanel(nowWrapId); return; } if (sub) sub.textContent = trip.name + (fdr(trip.startDate, trip.endDate) ? ' · ' + fdr(trip.startDate, trip.endDate) : '');
        renderNowPanel(nowWrapId); const pls = curPl(); const rts = curRts(); if (!pls.length && !rts.length) { ct.innerHTML = emH('📅', 'Vēl nav pievienotu vietu vai lidojumu', '<button class="btn bp bsm" onclick="showPlaceModal()">+ Vieta</button> <button class="btn bp bsm" onclick="showRouteModal()">✈️ Lidojums</button>'); return; } const items = [...pls.map(p => ({ ...p, _type: 'place' })), ...rts.map(r => ({ ...r, _type: 'route' }))];
        items.sort((a, b) => { if (a.date && b.date && a.date !== b.date) return a.date < b.date ? -1 : 1; const soA = a.sortOrder ?? 9999,
                soB = b.sortOrder ?? 9999; if (soA !== soB) return soA - soB; if (a.time && b.time) return a.time < b.time ? -1 : 1; return (a.cAt || 0) - (b.cAt || 0); }); const byD = {},
            noD = [];
        items.forEach(it => { if (it.date) { if (!byD[it.date]) byD[it.date] = [];
                byD[it.date].push(it); } else noD.push(it); }); let h = desk ? '<div class="plan-grid">' : ''; let day = 1; const { todayStr } = getNow(); let nowInserted = false; const sortedDates = Object.keys(byD).sort();
        sortedDates.forEach(date => { const isToday = date === todayStr;
            h += `<div class="tlday"><div class="tldh"${isToday?' style="color:#EF4444"':''}>📅 ${lvmd(date)} · Diena ${day++}${isToday?' · ŠODIEN':''}</div>`;
            byD[date].forEach((it, i, arr) => { const st = itemStatus(it); if (isToday && !nowInserted && st === 'future') { nowInserted = true;
                    h += `<div class="now-bar"><div class="now-line"></div><div class="now-pill"><div class="now-dot"></div>TAGAD</div><div class="now-line"></div></div>`; }
                h += `<div class="tli"><div class="tll"><div class="tldot ${st==='now'?'r':st==='past'?'v':it._type==='route'?'r':''}"></div>${!arr[i+1]?'':'<div class="tlline"></div>'}</div><div class="tlc">`; if (it._type === 'route') h += renderRouteCard(it, st, true); else h += renderPlaceCard(it, st);

            h += '</div>'; }); if (noD.length) { h += '<div class="tlday"><div class="tldh">📌 Bez datuma</div>';
            noD.forEach(it => { h += '<div class="tli"><div class="tll"><div class="tldot"></div></div><div class="tlc">'; if (it._type === 'route') h += renderRouteCard(it, 'future', true); else h += renderPlaceCard(it, 'future');
                h += '</div></div>'; });

        ct.innerHTML = h;

    function setupDragAndDropForAll(container) {
        // Make all cards (both .card and .route-card) draggable
        const draggables = container.querySelectorAll('.card.draggable-place, .route-card');
        draggables.forEach(el => {
            el.setAttribute('draggable', 'true');
            el.addEventListener('dragstart', handleDragStartGeneric);
            el.addEventListener('dragend', handleDragEndGeneric);
            el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
            el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
            el.addEventListener('drop', handleDropGeneric);
        });
    }

    let draggedItemId = null, draggedItemType = null;
    function handleDragStartGeneric(e) {
        const card = e.target.closest('.card.draggable-place, .route-card');
        if (!card) return;
        draggedItemId = card.dataset.id;
        draggedItemType = card.classList.contains('route-card') ? 'route' : 'place';
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ id: draggedItemId, type: draggedItemType }));
    }
    function handleDragEndGeneric(e) {
        const card = e.target.closest('.card.draggable-place, .route-card');
        if (card) card.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        draggedItemId = null;
    }
    function handleDropGeneric(e) {
        e.preventDefault();
        const targetCard = e.target.closest('.card.draggable-place, .route-card');
        if (!targetCard || !draggedItemId) return;
        targetCard.classList.remove('drag-over');
        const targetId = targetCard.dataset.id;
        const targetType = targetCard.classList.contains('route-card') ? 'route' : 'place';
        if (draggedItemId === targetId) return;
        // only allow reorder if same date and same type? For simplicity allow same date only
        const srcItem = draggedItemType === 'place' ? S.places.find(p => p.id === draggedItemId) : S.routes.find(r => r.id === draggedItemId);
        const tgtItem = targetType === 'place' ? S.places.find(p => p.id === targetId) : S.routes.find(r => r.id === targetId);
        if (!srcItem || !tgtItem || srcItem.date !== tgtItem.date) return;
        const allItemsOnDate = [...S.places.filter(p => p.tripId === S.tripId && p.date === srcItem.date).map(p => ({ ...p, _type: 'place' })),
                                 ...S.routes.filter(r => r.tripId === S.tripId && r.date === srcItem.date).map(r => ({ ...r, _type: 'route' }))];
        allItemsOnDate.sort((a,b) => (a.sortOrder??9999) - (b.sortOrder??9999));
        const srcIdx = allItemsOnDate.findIndex(i => i.id === srcItem.id);
        const tgtIdx = allItemsOnDate.findIndex(i => i.id === tgtItem.id);
        if (srcIdx === -1 || tgtIdx === -1) return;
        const [moved] = allItemsOnDate.splice(srcIdx, 1);
        allItemsOnDate.splice(tgtIdx, 0, moved);
        allItemsOnDate.forEach((it, idx) => {
            if (it._type === 'place') { const p = S.places.find(x => x.id === it.id); if(p) p.sortOrder = idx; }
            else { const r = S.routes.find(x => x.id === it.id); if(r) r.sortOrder = idx; }
        });
        save();
        if (S.tab === 'plans') { if (S.isDesk) renderPlan('d-plans-ct', 'd-plans-sub', true); else renderPlan('plans-ct', 'plans-sub', false); }
    }

    function renderRouteCard(r, status, draggable = true) { const dist = gcDist(r.fromLat, r.fromLng, r.toLat, r.toLng); const isNow = status === 'now'; const pct = isNow ? flightProgress(r) : null; const dragAttr = draggable ? `draggable="true" data-id="${r.id}" data-type="route"` : ''; return `<div class="route-card" ${dragAttr} style="margin-bottom:8px;opacity:${status==='past'?'.7':'1'}"><div class="crow"><div style="flex:1"><div class="route-from-to"><span class="route-iata">${r.fromIata||'?'}</span><span>✈️</span><span class="route-iata">${r.toIata||'?'}</span>${isNow?'<span style="font-size:10px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px">● Ceļā</span>':''}</div><div class="route-meta">${r.flightNumber?`<span>✈️ ${esc(r.flightNumber)}</span>`:''}${r.date?`<span>📅 ${fd(r.date)}</span>`:''}<span>🕐 ${gcTime(dist)}</span></div><div>${dist.toLocaleString()} km</div></div><div class="cacts" style="flex-direction:column"><button class="ibt" style="background:rgba(255,255,255,.2);color:#fff" onclick="showRouteModal('${r.id}')">✏️</button><button class="ibt del" style="background:rgba(255,255,255,.15);color:#fff" onclick="delRoute('${r.id}')">🗑️</button></div></div></div>`; }

value;localStorage.setItem(\'cp5_syncUrl\',this.value)"></div><div style="display:flex;gap:8px"><button class="btn bg2 bsm" style="flex:1" onclick="syncUp()">↑ Saglabāt</button><button class="btn bg2 bsm" style="flex:1" onclick="syncDown()">↓ Ielādēt</button></div>')}${setS('asc','📋 Apps Script Kods','<p style="font-size:12px;color:var(--mu);margin-bottom:10px">script.google.com → Jauns projekts → Ielīmē kodu → Execute as: Me · Access: Anyone</p><div id="asc-c" style="background:#1E293B;color:#7DD3FC;border-radius:14px;padding:14px 16px;font-size:11px;font-family:monospace;overflow:auto;max-height:200px;white-space:pre;line-height:1.6;margin:8px 0">function doGet(e){var ss=SpreadsheetApp.getActiveSpreadsheet();var sh=ss.getSheetByName(\'CelojumsData\');if(!sh)sh=ss.insertSheet(\'CelojumsData\');var v=sh.getRange(\'A1\').getValue();var d=v?JSON.parse(v):{trips:[],places:[],docs:[],routes:[]};return ContentService.createTextOutput(JSON.stringify({ok:true,data:d})).setMimeType(ContentService.MimeType.JSON);}function doPost(e){try{var ss=SpreadsheetApp.getActiveSpreadsheet();var sh=ss.getSheetByName(\'CelojumsData\');if(!sh)sh=ss.insertSheet(\'CelojumsData\');var p=JSON.parse(e.postData.contents);if(p.action===\'save\'){sh.getRange(\'A1\').setValue(JSON.stringify(p.data));return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);}}catch(err){return ContentService.createTextOutput(JSON.stringify({ok:false,error:err.message})).setMimeType(ContentService.MimeType.JSON);}}</div><button class="btn bg2 bsm" style="margin-top:8px" onclick="cpScript()">📋 Kopēt kodu</button>')}${setS('dt','💾 Lokālie dati','<div style="display:flex;flex-direction:column;gap:8px"><button class="btn bg2 bsm" onclick="expJSON()">📥 Eksportēt JSON</button><label class="btn bg2 bsm" style="cursor:pointer;justify-content:center">📤 Importēt JSON<input type="file" accept=".json" style="display:none" onchange="impJSON(this)"></label><button class="btn bd bsm" onclick="clearAll()">🗑️ Dzēst VISUS datus</button></div>')}<div style="text-align:center;color:var(--mu);font-size:11px;margin-top:24px">Ceļojuma Plānotājs · OpenStreetMap</div><div style="text-align:center;padding:20px 0 4px;color:var(--mu);font-size:11px">Ceļojuma Plānotājs <b style="color:var(--P)">v4.1</b></div>`; }

    function exportPDF() {
        const trip = curT();
        if (!trip) { notif('Nav izvēlēts ceļojums!', 'err'); return; }
        if (!window.jspdf) { notif('jsPDF vēl ielādējas...', 'err'); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const W=210, ML=14, MR=196, TW=MR-ML;
        let y=0;

        const P = S.places.filter(p=>p.tripId===trip.id).sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
        const R = S.routes.filter(r=>r.tripId===trip.id).sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
        const D = S.docs.filter(d=>d.tripId===trip.id);

        // Canvas renderer — fixed text overlap
        const cv=document.createElement('canvas'), ctx=cv.getContext('2d');
        function addTxt(text, x, yy, opts={}) {
            if (!text && text!==0) return 0;
            const {size=10, bold=false, color='#1C1C2E', maxW=null, align='left'} = opts;
            const str = String(text);
            const fPx = Math.round(size * 3.779528);
            const ff = (bold?'bold ':'')+fPx+'px "DM Sans",Arial,sans-serif';
            ctx.font = ff;
            const measW = ctx.measureText(str).width;
            if (maxW && measW/3.779528 > maxW) {
                const words = str.split(' ');
                let line='', totalH=0, lineH=size*0.52;
                for (const w of words) {
                    const test = line ? line+' '+w : w;
                    if (ctx.measureText(test).width/3.779528 > maxW && line) {
                        totalH += addTxt(line, x, yy+totalH, {...opts, maxW:null});
                        totalH += lineH*0.1;
                        line = w;
                    } else line = test;
                }
                if (line) totalH += addTxt(line, x, yy+totalH, {...opts, maxW:null});
                return totalH + lineH*0.2;
            }
            const wPx = Math.ceil(measW)+4, hPx = Math.ceil(fPx*1.5)+4;
            cv.width = Math.max(wPx,4); cv.height = Math.max(hPx,4);
            ctx.clearRect(0,0,cv.width,cv.height);
            ctx.font = ff; ctx.fillStyle = color; ctx.textBaseline='middle';
            ctx.fillText(str, 2, hPx/2);
            const wMm = wPx/3.779528, hMm = hPx/3.779528;
            const ax = align==='right'?x-wMm : align==='center'?x-wMm/2 : x;
            doc.addImage(cv.toDataURL('image/png'),'PNG', ax, yy, wMm, hMm);
            return size*0.52;
        }
        function newPage() { doc.addPage(); y=0; }
        function chk(need=14) { if (y+need>284) newPage(); }
        function hLine(col=[220,228,226]) { doc.setDrawColor(...col); doc.setLineWidth(0.3); doc.line(ML, y, MR, y); }
        function secHdr(title) { chk(14); y+=3; doc.setFillColor(26,95,88); doc.roundedRect(ML,y,TW,8,1.5,1.5,'F'); addTxt(title, ML+3, y+0.8, {size:10, bold:true, color:'#ffffff'}); y+=11; }

        // COVER
        doc.setFillColor(26,95,88); doc.rect(0,0,W,46,'F');
        doc.setFillColor(212,113,46); doc.rect(0,46,W,3,'F');
        addTxt(trip.name.slice(0,38), W/2, 10, {size:20, bold:true, color:'#fff', align:'center'});
        if (trip.destination) addTxt(trip.destination, W/2, 26, {size:12, color:'rgba(255,255,255,.88)', align:'center'});
        const dr=fdr(trip.startDate,trip.endDate), days=dbw(trip.startDate,trip.endDate);
        if (dr) addTxt(dr+(days?' · '+days+' dienas':''), W/2, 37, {size:10, color:'#C8F0EC', align:'center'});

        // Stats row
        doc.setFillColor(248,251,250); doc.rect(0,49,W,24,'F');
        doc.setDrawColor(220,228,226); doc.setLineWidth(0.3); doc.line(0,73,W,73);
        const stats=[{n:P.length,l:'Vietas'},{n:R.length,l:'Lidojumi'},{n:D.length,l:'Dokumenti'},...(days?[{n:days,l:'Dienas'}]:[])];
        const sw=W/stats.length;
        stats.forEach((s,i)=>{ const cx=sw*i+sw/2; addTxt(String(s.n), cx, 52, {size:17, bold:true, color:'#1A5F58', align:'center'}); addTxt(s.l, cx, 64, {size:8.5, color:'#7A8C8A', align:'center'}); });
        y=80;
        if (trip.description){ chk(10); y += addTxt(trip.description, ML, y, {size:10, color:'#4A5568', maxW:TW}); y += 4; }

        // ITINERARY
        secHdr('CEĻOJUMA PLĀNS / LAIKA SKALA');
        const allItems=[...P.map(p=>({...p,_t:'place'})),...R.map(r=>({...r,_t:'route'}))].sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
        const byD={}, noD=[];
        allItems.forEach(it=>{ if(it.date){if(!byD[it.date])byD[it.date]=[];byD[it.date].push(it);}else noD.push(it); });
        let dayNum=1;
        Object.keys(byD).sort().forEach(date=>{
            chk(18);
            addTxt('Diena '+dayNum+'  —  '+lvmd(date), ML, y, {size:10, bold:true, color:'#1A5F58'});
            y+=5.5; hLine([26,95,88]); y+=3;
            dayNum++;
            byD[date].forEach(it=>{
                chk(14);
                if (it._t==='route') {
                    const dist=gcDist(it.fromLat,it.fromLng,it.toLat,it.toLng);
                    doc.setFillColor(212,113,46); doc.circle(ML+2.5,y+2.5,2,'F');
                    y += addTxt((it.fromIata||'?')+' → '+(it.toIata||'?')+(it.flightNumber?' · '+it.flightNumber:''), ML+6.5, y, {size:9.5, bold:true, color:'#C2410C'});
                    y += addTxt(esc((it.fromName||''))+' → '+esc((it.toName||''))+' · '+dist.toLocaleString()+' km', ML+6.5, y, {size:8.5, color:'#666', maxW:TW-8});
                } else {
                    const pt=getPT(it.type);
                    doc.setFillColor(it.visited?74:26, it.visited?222:95, it.visited?128:88);
                    doc.circle(ML+2.5,y+2.5,2,'F');
                    y += addTxt(it.name, ML+6.5, y, {size:9.5, bold:true, color:'#1C1C2E'});
                    const sub=pt.lbl+(it.time?' · '+it.time:'')+(it.address?' · '+it.address.slice(0,55):'')+(it.visited?' ✓':'');
                    y += addTxt(sub, ML+6.5, y, {size:8.5, color:'#555', maxW:TW-8});
                    if (it.notes){ y += addTxt('"'+it.notes+'"', ML+8, y, {size:8, color:'#888', maxW:TW-10}); }
                }
                y+=1.5;
            });
            y+=2;
        });
        if (noD.length) {
            chk(12);
            addTxt('Bez datuma', ML, y, {size:9.5, bold:true, color:'#1A5F58'}); y+=5.5;
            noD.forEach(it=>{
                chk(10); const pt=getPT(it.type);
                y += addTxt('• '+it.name+' ('+pt.lbl+')', ML+3, y, {size:9, color:'#444', maxW:TW-4});
                y+=1;
            });
        }

        // FLIGHTS
        if (R.length) {
            secHdr('LIDOJUMI');
            R.forEach(r=>{
                chk(18);
                const dist=gcDist(r.fromLat,r.fromLng,r.toLat,r.toLng);
                doc.setFillColor(212,113,46); doc.roundedRect(ML,y,TW,14,2,2,'F');
                addTxt((r.fromIata||'?')+'  ✈  '+(r.toIata||'?'), ML+3, y+1.5, {size:13, bold:true, color:'#fff'});
                const meta=[r.fromName+' → '+r.toName,r.flightNumber?'Reiss: '+r.flightNumber:'',r.date?fd(r.date):'',r.departureTime?'Izlido: '+r.departureTime:'',r.arrivalTime?'Ielido: '+r.arrivalTime:''].filter(Boolean).join('  ·  ');
                addTxt(meta, ML+3, y+8, {size:8.5, color:'#FDEBD0', maxW:TW-30});
                addTxt(dist.toLocaleString()+' km · '+gcTime(dist), MR-2, y+2.5, {size:8, color:'#FDEBD0', align:'right'});
                y+=17;
            });
        }

        // DOCUMENTS
        if (D.length) {
            secHdr('DOKUMENTI');
            D.forEach(d=>{
                chk(14);
                const dt=getDT(d.type);
                doc.setFillColor(246,249,248); doc.setDrawColor(220,228,226); doc.setLineWidth(0.3);
                doc.roundedRect(ML,y,TW,11,1.5,1.5,'FD');
                const title = dt.lbl+': '+d.title;
                addTxt(title, ML+3, y+1.5, {size:9, bold:true, color:'#1C1C2E', maxW:TW-42});
                const meta=[d.date?fd(d.date):'',d.provider||'',d.confirmationNumber?'PNR: '+d.confirmationNumber:''].filter(Boolean).join(' · ');
                if (meta) addTxt(meta, MR-2, y+1.5, {size:8, color:'#7A8C8A', align:'right'});
                if (d.type==='lidojums'&&(d.fromIata||d.toIata)) {
                    addTxt((d.fromIata||'')+'→'+(d.toIata||'')+(d.flightNumber?' '+d.flightNumber:'')+(d.seat?' · Vieta: '+d.seat:''), ML+3, y+7, {size:8, color:'#1A5F58', maxW:TW-10});
                }
                y+=14;
            });
        }

        const pc=doc.getNumberOfPages();
        for(let i=1;i<=pc;i++){
            doc.setPage(i);
            doc.setDrawColor(220,228,226); doc.setLineWidth(0.3); doc.line(ML,286,MR,286);
            addTxt('Ceļojuma Plānotājs · '+trip.name, ML, 288, {size:7.5, color:'#AAB4B2'});
            addTxt(i+' / '+pc, MR, 288, {size:7.5, color:'#AAB4B2', align:'right'});
        }
        const fn=trip.name.replace(/[^\wāčēģīķļņšūžĀČĒĢĪĶĻŅŠŪŽ\s-]/g,'').trim().replace(/\s+/g,'_')+'_'+(trip.startDate||'celojums')+'.pdf';
        doc.save(fn);
        notif('PDF eksportēts! 📄','ok');
    }

    // drag helpers for plan items
    let _dragPlaceId = null, _dragOverId = null;
    function onPlaceDragStart(e, placeId) { _dragPlaceId = placeId; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', placeId); setTimeout(() => e.target.closest('.card')?.classList.add('dragging'), 0); }
    function onPlaceDragOver(e, placeId) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (_dragOverId !== placeId) { document.querySelectorAll('.card.drag-over').forEach(el => el.classList.remove('drag-over')); _dragOverId = placeId; e.target.closest('.card')?.classList.add('drag-over'); } }
    function onPlaceDragLeave(e) { e.target.closest('.card')?.classList.remove('drag-over'); }
    function onPlaceDrop(e, targetId) { e.preventDefault(); document.querySelectorAll('.card.drag-over, .card.dragging').forEach(el => el.classList.remove('drag-over','dragging')); if (!_dragPlaceId || _dragPlaceId === targetId) return; const fromIdx = S.places.findIndex(p => p.id === _dragPlaceId); const toIdx = S.places.findIndex(p => p.id === targetId); if (fromIdx < 0 || toIdx < 0) return; const [moved] = S.places.splice(fromIdx, 1); S.places.splice(toIdx, 0, moved); save(); if (S.isDesk) renderPlan('d-plans-ct','d-plans-sub',true); else renderPlan('plans-ct','plans-sub',false); _dragPlaceId = null; _dragOverId = null; }
    function onPlaceDragEnd(e) { document.querySelectorAll('.card.drag-over, .card.dragging').forEach(el => el.classList.remove('drag-over','dragging')); _dragPlaceId = null; _dragOverId = null; }

    function buildMapDateChips() { const chips = document.getElementById('map-df-chips'); if (!chips) return; const allPl = curPl().filter(p => p.lat && p.lng); const allRts = curRts().filter(r => r.fromLat && r.toLat); const dates = [...new Set([...allPl.map(p => p.date), ...allRts.map(r => r.date)].filter(Boolean))].sort(); if (!dates.length) { chips.innerHTML = '<div style="font-size:12px;color:var(--mu)">Nav datumu</div>'; return; } const DAY_COL = ['#1A5F58','#2563EB','#7C3AED','#C2410C','#0891B2','#065F46','#BE123C','#854D0E']; const mk = (val, label, col) => { const on = S.mapDateFilter === val; const btn = document.createElement('button'); btn.style.cssText = `display:flex;align-items:center;gap:6px;width:100%;text-align:left;padding:6px 8px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:4px;background:${on ? 'var(--Pl)' : 'transparent'};color:${on ? 'var(--P)' : 'var(--mu)'}`; btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>${label}`; btn.addEventListener('click', () => setMapFilter(val)); return btn; }; chips.innerHTML = ''; chips.appendChild(mk('all', 'Visas dienas', 'var(--mu)')); dates.forEach((d, i) => chips.appendChild(mk(d, lvmd(d), DAY_COL[i % DAY_COL.length]))); }
    function toggleMapFilter() { const p = document.getElementById('map-df-panel'); if (!p) return; if (p.style.display === 'none' || !p.style.display) { buildMapDateChips(); p.style.display = 'block'; } else p.style.display = 'none'; }
    function setMapFilter(val) { S.mapDateFilter = val; localStorage.setItem('cp5_mapdf', val); const p = document.getElementById('map-df-panel'); if (p) p.style.display = 'none'; renderMap(); }

    function dragItem(ev, type, id) { ev.dataTransfer.setData('text', JSON.stringify({type, id})); }
    function notif(msg, type = 'inf') { const c = document.getElementById('nwrap'); const n = document.createElement('div'); n.className = 'nf ' + type; n.textContent = msg; c.appendChild(n); setTimeout(() => n.remove(), 3200); }

    function updateOnline() { const d = document.getElementById('odot'); if (d) { d.className = navigator.onLine ? 'dot-on' : 'dot-off'; } }
    window.addEventListener('online', updateOnline);
    window.addEventListener('offline', updateOnline);
    document.addEventListener('DOMContentLoaded', () => { load();
        applyTheme(S.theme);
        applyFont(S.font);
        applyFontSize(S.fontSize || 1);
        updateOnline();
        applyLayout();
        setupSearch();
        initPWABanner();
        initLeaflet();
        S.isDesk = window.innerWidth >= 900;
        applyLayout();
        renderAll();
        window.addEventListener('resize', () => { const wasDesk = S.isDesk; S.isDesk = window.innerWidth >= 900; if (S.isDesk !== wasDesk) { applyLayout(); renderAll(); } });
        setTimeout(() => { if (LMAP) { LMAP.invalidateSize(); renderMap(); } }, 200); if (S.autoSync && S.syncUrl && navigator.onLine) setTimeout(syncDown, 800);
        history.replaceState({ app: true }, '', location.href);
        _navStack.push(S.tab);
        window.addEventListener('popstate', e => { if (modalOpen) { closeModal(); history.pushState({ app: true }, '', location.href); return; } const sm = document.getElementById('sm-ov'); if (sm && sm.classList.contains('on')) { sm.classList.remove('on'); document.getElementById('sm-panel')?.classList.remove('on'); history.pushState({ app: true }, '', location.href); return; } if (_navStack.length > 1) { _navStack.pop(); const prev = _navStack[_navStack.length - 1]; if (prev) switchTab(prev); } else { history.pushState({ app: true }, '', location.href); } });
    });
    </script>
